<h2 mat-dialog-title>{{ titulo }}</h2>

<form [formGroup]="form" (ngSubmit)="salvar()">
  <mat-dialog-content>
    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Número do Processo</mat-label>
      <input matInput formControlName="numero_processo" placeholder="Ex: 0001234-56.2026.8.26.0100" />
      @if (form.get('numero_processo')?.hasError('required')) {
        <mat-error>Número do processo é obrigatório</mat-error>
      }
    </mat-form-field>

    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Título</mat-label>
      <input matInput formControlName="titulo" placeholder="Ex: Ação de Cobrança" />
      @if (form.get('titulo')?.hasError('required')) {
        <mat-error>Título é obrigatório</mat-error>
      }
    </mat-form-field>

    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Descrição</mat-label>
      <textarea matInput formControlName="descricao" rows="3" placeholder="Descrição do processo (opcional)"></textarea>
    </mat-form-field>

    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Status</mat-label>
      <mat-select formControlName="status">
        @for (opt of statusOptions; track opt.value) {
          <mat-option [value]="opt.value">{{ opt.label }}</mat-option>
        }
      </mat-select>
    </mat-form-field>
  </mat-dialog-content>

  <mat-dialog-actions align="end">
    <button mat-button type="button" (click)="cancelar()" [disabled]="isSaving()">
      Cancelar
    </button>
    <button
      mat-raised-button
      color="primary"
      type="submit"
      [disabled]="form.invalid || isSaving()"
    >
      @if (isSaving()) {
        <mat-spinner diameter="20" />
      } @else {
        Salvar
      }
    </button>
  </mat-dialog-actions>
</form>
